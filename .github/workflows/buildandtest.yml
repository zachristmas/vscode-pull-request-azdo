name: Build and Test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version comes from the packageManager field in package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Bundle
        run: pnpm run bundle

      - name: Package VSIX
        run: npx vsce package --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'

      # Shadow mode: the suite was repaired in v1.5.2 but has never run in CI on this fork.
      # Non-blocking until it proves stable; flip to required on evidence, not on a date.
      - name: Run tests (non-blocking)
        continue-on-error: true
        run: xvfb-run -a pnpm run test
        env:
          TEST_JUNIT_XML_PATH: ${{ github.workspace }}/test-results.xml
          VSCODE_PR_AZDO_TEST_PAT: ${{ secrets.AZDO_PAT_TOKEN_TEST }}
