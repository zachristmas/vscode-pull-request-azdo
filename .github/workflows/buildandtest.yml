name: Build and Test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version comes from the packageManager field in package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Lint
        run: pnpm run lint:ci

      - name: Bundle
        run: pnpm run bundle

      - name: Package VSIX
        run: npx vsce package --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'

      # Shadow mode: the suite was repaired in v1.5.2 but had never actually run in CI - it crash-exited
      # on load (utils.ts/diffHunk.ts circular-import init, fixed alongside this) so the step passed in
      # seconds without running a single test. With the crash gone the suite now runs; the one live-network
      # suite (azdoRepository.test.ts) self-skips when AZDO_PAT_TOKEN_TEST isn't set instead of hanging
      # until this step's timeout, so this no longer needs continue-on-error/timeout-minutes as a
      # hang-safety-net - kept anyway as a backstop against a future test introducing the same mistake.
      # Flip to required (remove continue-on-error) once AZDO_PAT_TOKEN_TEST is set and this is
      # observed green a few times, not on a date.
      - name: Run tests (non-blocking)
        continue-on-error: true
        timeout-minutes: 12
        run: xvfb-run -a pnpm run test
        env:
          TEST_JUNIT_XML_PATH: ${{ github.workspace }}/test-results.xml
          VSCODE_PR_AZDO_TEST_PAT: ${{ secrets.AZDO_PAT_TOKEN_TEST }}
          # Optional: point azdoRepository.test.ts at a real repo in your org instead of the
          # upstream maintainer's personal test org. Not secret - fine as repo/org Variables.
          VSCODE_PR_AZDO_TEST_REPO: ${{ vars.AZDO_TEST_REPO }}
          VSCODE_PR_AZDO_TEST_REPO_URL: ${{ vars.AZDO_TEST_REPO_URL }}
